<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

<body>
  <header id="header">
    <img id="header-img" src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png" alt="Company Logo" />
    
    <nav id="nav-bar">
      <ul>
        <li><a class="nav-link" href="#features">Features</a></li>
        <li><a class="nav-link" href="#how-it-works">How It Works</a></li>
        <li><a class="nav-link" href="#pricing">Pricing</a></li>
      </ul>
    </nav>

    <video id="video" controls>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <form id="form" action="https://www.freecodecamp.org/email-submit" method="POST">
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" placeholder="Your e-mail" required>
      <input id="submit" type="submit" value="Submit your answers">
    </form>
  </header>

  <section id="features"></section>
  <section id="how-it-works"></section>
  <section id="pricing"></section>

</body>
</html>
